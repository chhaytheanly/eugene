version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eugene
    ports:
      - "6969:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eugene"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: eugene@personal.com
      PGADMIN_DEFAULT_PASSWORD: eugene2004
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "6767:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped

  api:
    image: oven/bun:latest
    container_name: api
    working_dir: /app

    volumes:
      - ./server:/app
      - api_node_modules:/app/node_modules

    command: >
      sh -c "
      bun install &&
      bun run dev
      "

    depends_on:
      db:
        condition: service_healthy

    env_file:
      - ./server/.env
      
    ports:
      - "6868:6868"

  web:
    image: oven/bun:latest
    container_name: web
    working_dir: /app

    volumes:
      - ./statics:/app
      - web_node_modules:/app/node_modules

    command: sh -c "bun install && bun run dev --host 0.0.0.0"

    env_file:
      - ./statics/.env

    ports:
      - "5173:5173"

    depends_on:
      - api

volumes:
  pgdata:
  pgadmin_data:
  api_node_modules:
  web_node_modules: